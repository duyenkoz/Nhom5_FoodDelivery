<!doctype html>
<html lang="vi">
<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>{% block title %}fiveFood{% endblock %}</title>
    <link rel="stylesheet" href="{{ url_for('static', filename='css/style.css') }}">
    {% block extra_css %}{% endblock %}
</head>
<body>
    {% include "partials/header_search.html" %}
    <main class="page-shell {% block page_shell_class %}{% endblock %}">
        <div class="container {% block content_container_class %}{% endblock %}">
            {% block content %}{% endblock %}
        </div>
    </main>
    {% include "partials/footer.html" %}
    <script src="{{ url_for('static', filename='js/location.js') }}" defer></script>
    <script src="{{ url_for('static', filename='js/home_search.js') }}" defer></script>
</body>
</html>
